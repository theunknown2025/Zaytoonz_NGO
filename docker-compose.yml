# =============================================================================
# Zaytoonz NGO — Hostinger Docker Manager
# Domains: zaytoonz.com  |  zaytoonz.org
#
# Services:
#   nextjs         — Next.js web app (Social Page + full web app)
#   python-scraper — FastAPI scraper with Chrome/Playwright
#   nlweb          — NLWeb AI service
#   nginx          — Reverse proxy (HTTP → HTTPS, domain redirects)
#   certbot        — Let's Encrypt SSL auto-renewal
#
# DEPLOYMENT PHASES
# ─────────────────
# Phase 1 — First deploy (no SSL yet):
#   docker compose up -d
#   docker compose exec certbot certbot certonly --webroot \
#     -w /var/www/certbot \
#     -d zaytoonz.com -d www.zaytoonz.com \
#     --email you@example.com --agree-tos --non-interactive
#   docker compose exec certbot certbot certonly --webroot \
#     -w /var/www/certbot \
#     -d zaytoonz.org -d www.zaytoonz.org \
#     --email you@example.com --agree-tos --non-interactive
#   docker compose restart nginx
#
# Phase 2 — Subsequent deploys (certs exist, nginx auto-selects HTTPS):
#   git pull && docker compose build && docker compose up -d
# =============================================================================

services:

  # ── Next.js Web App ────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.webapp
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_OPENAI_API_KEY=${NEXT_PUBLIC_OPENAI_API_KEY}
        - NEXT_PUBLIC_USE_EXTERNAL_SCRAPER=${NEXT_PUBLIC_USE_EXTERNAL_SCRAPER:-true}
        - NEXT_PUBLIC_EXTERNAL_SCRAPER_URL=${NEXT_PUBLIC_EXTERNAL_SCRAPER_URL:-https://zaytoonz.com/scraper-api}
        - NEXT_PUBLIC_FALLBACK_TO_LOCAL=${NEXT_PUBLIC_FALLBACK_TO_LOCAL:-true}
    image: zaytoonz-nextjs:latest
    container_name: zaytoonz-nextjs
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_OPENAI_API_KEY=${NEXT_PUBLIC_OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-2000}
      - NEXT_PUBLIC_USE_EXTERNAL_SCRAPER=${NEXT_PUBLIC_USE_EXTERNAL_SCRAPER:-true}
      - NEXT_PUBLIC_EXTERNAL_SCRAPER_URL=${NEXT_PUBLIC_EXTERNAL_SCRAPER_URL:-https://zaytoonz.com/scraper-api}
      - SCRAPER_INTERNAL_URL=http://python-scraper:8000
      - NEXT_PUBLIC_FALLBACK_TO_LOCAL=${NEXT_PUBLIC_FALLBACK_TO_LOCAL:-true}
      - NLWEB_URL=http://nlweb:8000
    volumes:
      - ./public:/app/public:ro
    restart: unless-stopped
    depends_on:
      - nlweb
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Python Scraper (FastAPI + Chrome + Playwright) ─────────────────────────
  python-scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: zaytoonz-scraper:latest
    container_name: zaytoonz-scraper
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - ENVIRONMENT=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - scraper-cache:/root/.cache
    restart: unless-stopped
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── NLWeb AI Service ────────────────────────────────────────────────────────
  nlweb:
    build:
      context: .
      dockerfile: Dockerfile.nlweb
    image: zaytoonz-nlweb:latest
    container_name: zaytoonz-nlweb
    ports:
      - "8002:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app/NLWeb-main/code/python
      - PORT=8000
      - NLWEB_CONFIG_DIR=/app/NLWeb-main/config
      - NLWEB_OUTPUT_DIR=/app/NLWeb-main/data/nlweb
      - NLWEB_OUTPUT_DIR_RELATIVE=../data/nlweb
      - NLWEB_LOGGING_PROFILE=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ENDPOINT=${OPENAI_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_VECTOR_SEARCH_ENDPOINT=${AZURE_VECTOR_SEARCH_ENDPOINT:-}
      - AZURE_VECTOR_SEARCH_API_KEY=${AZURE_VECTOR_SEARCH_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - INCEPTION_ENDPOINT=${INCEPTION_ENDPOINT:-}
      - INCEPTION_API_KEY=${INCEPTION_API_KEY:-}
      - SNOWFLAKE_ACCOUNT_URL=${SNOWFLAKE_ACCOUNT_URL:-}
      - SNOWFLAKE_PAT=${SNOWFLAKE_PAT:-}
      - SNOWFLAKE_EMBEDDING_MODEL=${SNOWFLAKE_EMBEDDING_MODEL:-}
      - SNOWFLAKE_CORTEX_SEARCH_SERVICE=${SNOWFLAKE_CORTEX_SEARCH_SERVICE:-}
      - MILVUS_ENDPOINT=${MILVUS_ENDPOINT:-}
      - MILVUS_TOKEN=${MILVUS_TOKEN:-}
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - OPENSEARCH_ENDPOINT=${OPENSEARCH_ENDPOINT:-}
      - OPENSEARCH_CREDENTIALS=${OPENSEARCH_CREDENTIALS:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-}
      - ELASTICSEARCH_API_KEY=${ELASTICSEARCH_API_KEY:-}
      - POSTGRES_CONNECTION_STRING=${POSTGRES_CONNECTION_STRING:-}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_RAG_ID_ENV=${CLOUDFLARE_RAG_ID_ENV:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
    volumes:
      - nlweb-data:/app/NLWeb-main/data
    restart: unless-stopped
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  # Auto-selects HTTP-only config (nginx-init.conf) when no certs exist,
  # or full HTTPS config (nginx-webapp.conf) when certs are present.
  nginx:
    image: nginx:alpine
    container_name: zaytoonz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-webapp.conf:/etc/nginx/conf.d/nginx-https.conf:ro
      - ./nginx-init.conf:/etc/nginx/conf.d/nginx-http.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    entrypoint: >
      sh -c "
        if [ -f /etc/letsencrypt/live/zaytoonz.com/fullchain.pem ]; then
          echo '[nginx] SSL certs found — starting in HTTPS mode';
          cp /etc/nginx/conf.d/nginx-https.conf /etc/nginx/nginx.conf;
        else
          echo '[nginx] No SSL certs yet — starting in HTTP-only mode';
          cp /etc/nginx/conf.d/nginx-http.conf /etc/nginx/nginx.conf;
        fi
        nginx -t && nginx -g 'daemon off;'
      "
    restart: unless-stopped
    depends_on:
      nextjs:
        condition: service_healthy
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot SSL / Auto-renewal ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: zaytoonz-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped
    networks:
      - zaytoonz-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  zaytoonz-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  scraper-cache:
    driver: local
  nlweb-data:
    driver: local
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local
