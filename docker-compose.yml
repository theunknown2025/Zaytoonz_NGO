# =============================================================================
# Zaytoonz NGO — Web App Deployment (Phase 1)
# Domains: zaytoonz.com  |  zaytoonz.org
#
# Services in this phase:
#   nextjs   — Next.js web app (Social Page + full web app)
#   nginx    — Reverse proxy with SSL (auto-switches HTTP ↔ HTTPS)
#   certbot  — Let's Encrypt SSL auto-renewal
#
# Scraper and NLWeb are NOT included in this phase.
# NEXT_PUBLIC_USE_EXTERNAL_SCRAPER=false in .env disables scraper UI features.
#
# DEPLOYMENT STEPS (PuTTY)
# ─────────────────────────
# 1. git clone + create .env  (copy .env.production, fill OPENAI_API_KEY)
# 2. mkdir -p certbot/conf certbot/www
# 3. docker compose build
# 4. docker compose up -d
#    → nginx starts in HTTP mode (no certs yet)
# 5. Get SSL certs:
#      docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot \
#        -d zaytoonz.com -d www.zaytoonz.com \
#        --email you@example.com --agree-tos --non-interactive
#
#      docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot \
#        -d zaytoonz.org -d www.zaytoonz.org \
#        --email you@example.com --agree-tos --non-interactive
# 6. docker compose restart nginx
#    → nginx auto-detects certs and switches to HTTPS
# =============================================================================

services:

  # ── Next.js Web App ────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.webapp
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_OPENAI_API_KEY=${NEXT_PUBLIC_OPENAI_API_KEY}
        - NEXT_PUBLIC_USE_EXTERNAL_SCRAPER=${NEXT_PUBLIC_USE_EXTERNAL_SCRAPER:-false}
        - NEXT_PUBLIC_EXTERNAL_SCRAPER_URL=${NEXT_PUBLIC_EXTERNAL_SCRAPER_URL:-}
        - NEXT_PUBLIC_FALLBACK_TO_LOCAL=${NEXT_PUBLIC_FALLBACK_TO_LOCAL:-false}
    image: zaytoonz-nextjs:latest
    container_name: zaytoonz-nextjs
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_OPENAI_API_KEY=${NEXT_PUBLIC_OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS:-2000}
      - NEXT_PUBLIC_USE_EXTERNAL_SCRAPER=${NEXT_PUBLIC_USE_EXTERNAL_SCRAPER:-false}
      - NEXT_PUBLIC_EXTERNAL_SCRAPER_URL=${NEXT_PUBLIC_EXTERNAL_SCRAPER_URL:-}
      - NEXT_PUBLIC_FALLBACK_TO_LOCAL=${NEXT_PUBLIC_FALLBACK_TO_LOCAL:-false}
    volumes:
      - ./public:/app/public:ro
    restart: unless-stopped
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  # Auto-selects HTTP-only config when no certs exist,
  # or full HTTPS config once Let's Encrypt certs are in place.
  nginx:
    image: nginx:alpine
    container_name: zaytoonz-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-webapp.conf:/etc/nginx/conf.d/nginx-https.conf:ro
      - ./nginx-init.conf:/etc/nginx/conf.d/nginx-http.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    entrypoint: >
      sh -c "
        if [ -f /etc/letsencrypt/live/zaytoonz.com/fullchain.pem ]; then
          echo '[nginx] SSL certs found — starting in HTTPS mode';
          cp /etc/nginx/conf.d/nginx-https.conf /etc/nginx/nginx.conf;
        else
          echo '[nginx] No SSL certs yet — starting in HTTP-only mode';
          cp /etc/nginx/conf.d/nginx-http.conf /etc/nginx/nginx.conf;
        fi
        nginx -t && nginx -g 'daemon off;'
      "
    restart: unless-stopped
    depends_on:
      nextjs:
        condition: service_healthy
    networks:
      - zaytoonz-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot SSL / Auto-renewal ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: zaytoonz-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done"
    restart: unless-stopped
    networks:
      - zaytoonz-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  zaytoonz-network:
    driver: bridge

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local
