# ─────────────────────────────────────────────────────────────────────────────
# nginx-init.conf  —  Phase 1: HTTP-only
# Use this config BEFORE SSL certificates exist.
# Serves the ACME challenge for Let's Encrypt and proxies app traffic over HTTP.
# After certs are obtained, nginx will auto-switch to nginx-webapp.conf (HTTPS).
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript image/svg+xml;

    upstream nextjs_backend   { server nextjs:3000;         }
    upstream scraper_backend  { server python-scraper:8000; }

    server {
        listen 80;
        listen [::]:80;
        server_name zaytoonz.com www.zaytoonz.com zaytoonz.org www.zaytoonz.org;

        client_max_body_size 100M;

        # Health probe
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Scraper API
        location /scraper-api/ {
            proxy_pass http://scraper_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 75s;
        }

        # NLWeb API
        location /nlweb-api/ {
            proxy_pass http://nlweb:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Main Next.js app
        location / {
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    300s;
            proxy_connect_timeout  75s;
        }

        location /_next/static/ {
            proxy_pass http://nextjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
